name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Copy letter data for static hosting
        run: cp backend/app/data/letters.json frontend/public/letters.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_USE_STATIC_DATA: ${{ secrets.VITE_API_URL && 'false' || 'true' }}
          VITE_BASE_PATH: /LetterLibraryWebsite/
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Required for admin login on GitHub Pages when no backend is deployed
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
        run: npm run build

      - name: Setup SPA routing on GitHub Pages
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
